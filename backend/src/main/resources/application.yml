spring:
  application:
    name: coding-classroom-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classroom_db}
    username: ${DB_USERNAME:aakash}
    password: ${DB_PASSWORD:akash@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  
jwt:
  secret: ${JWT_SECRET:very_secret_key_that_should_be_at_least_256_bits_long_for_hs256}
  expiration: 86400000 # 24 hours
  refresh-expiration: 604800000 # 7 days
