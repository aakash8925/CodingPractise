services:
  - type: web
    name: coding-classroom-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: classroom-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: classroom-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: classroom-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: classroom-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: classroom-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: coding-classroom-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: coding-classroom-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_OPTIONS
        value: "--max-old-space-size=256"

databases:
  - name: classroom-db
    databaseName: classroom_db
    user: classroom_user
    plan: free
