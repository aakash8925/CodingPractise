services:
  - type: web
    name: coding-classroom-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: classroom-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: classroom-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: classroom-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: classroom-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: classroom-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Put your Vercel URL here (e.g. https://your-app.vercel.app)

databases:
  - name: classroom-db
    databaseName: classroom_db
    user: classroom_user
    plan: free
